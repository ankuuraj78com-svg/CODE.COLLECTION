<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital clock</title>
    <style>
    .body{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background-color: lightgray;
  font-family:Arial;

}

/* h1{
  /* margin-bottom:20px; */
/* }  */

#clock{
    height: 100px;
    width: 400px;
    justify-content: center;
    display: flex;
    /* margin-left:7%; */
    /* margin-top: 10%; */
    background-color: cadetblue;
    border-radius: 50px;
    color: white;
    align-items: center;
    border: 2px solid lightcyan;
    font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
  font-size:60px;
}
#clock:hover{
    transition: calc(1.0);
    background-color: rgb(16, 90, 80);
}
.digital{
   
    margin-left: 30px;
    font-family: Verdana, Geneva, Tahoma, sans-serif;
    margin-top: 50px;
    color: burlywood;
}
.back{
    margin-top: 14%;
    height: 230px;
    width: 550px;
    border-radius: 40px;
    background-color: lightcyan;
    display: grid;
    justify-content:center;
    box-shadow: 5px 15px 15px lightcoral;

}
.back:hover{

  box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
}
 </style>

</head>

<body onload="time()">
    <h1></h1>
    
</body>
<script>
// let x=new Date();
// let b=x.getHours();
// document.write(b);
function time(){
    let date= new Date();
    let hour= date.getHours();
    let mintue= date.getMinutes();
    let second= date.getSeconds();
    // let Date = date.getDate();
    let s = "AM"
      

 if(hour >=12){
        s = "PM";


    } 
    
    if(hour > 12){
        hour = hour-12;
    }
   
     hour=hour <10 ? "0" + hour : hour;
     mintue=mintue <10 ? "0" + mintue:mintue;
     second = second <10 ? "0"+ second:second;
      
     let currentime = hour +":" +mintue +":" +second +":"+s;
     document.getElementsByTagName("h1")[0].innerText=currentime;
     setTimeout(time,1000);
     


}


</script>
</html>
